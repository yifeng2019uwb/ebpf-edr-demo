name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Vet and test packages that have no BPF dependency.
      # These work without running `make generate` first.
      - name: Vet
        run: go vet ./internal/... ./pkg/detector/...

      - name: Test
        run: go test -v -count=1 ./internal/... ./pkg/detector/...

      # Full binary build requires generated BPF wrappers in pkg/bpf/.
      # Run `make generate` on the GCP VM (needs clang), commit the generated
      # *_bpf*.go files, and this step will start passing automatically.
      - name: Build
        run: go build ./cmd/edr-monitor/
        continue-on-error: true
