# EDR Detection Rules
# Each rule defines a condition to match against process execution events.
# Matched events generate alerts at the specified severity level.

rules:
  - name: shell_spawned_from_server
    description: Shell process spawned from a server process (potential RCE)
    severity: CRITICAL
    condition:
      parent_contains: ["nginx", "apache", "apache2", "python3", "gunicorn", "node"]
      path_contains: ["/bin/sh", "/bin/bash", "/bin/zsh", "/usr/bin/sh", "/usr/bin/bash"]

  - name: execution_from_tmp
    description: Process executed from /tmp (common malware staging area)
    severity: HIGH
    condition:
      path_startswith: ["/tmp/"]

  - name: execution_from_dev_shm
    description: Process executed from /dev/shm (memory-backed filesystem, evasion technique)
    severity: HIGH
    condition:
      path_startswith: ["/dev/shm/"]

# Baseline suppression — known safe parent/child pairs to suppress from alerts
baseline:
  suppress:
    - parent: "sshd"
      path_contains: "bash"
    - parent: "systemd"
      path_contains: ""
    - parent: "bpftrace"
      path_contains: ""
    - parent: "make"
      path_contains: ""
    - parent: "sudo"
      path_contains: ""
